name: Docker Images without build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "上游 madeye/meow-rs 的 Release Tag，例如 v0.14.0"
        required: true
        default: "v0.14.0"
        type: string
      push_latest:
        description: "是否额外推送 latest-scratch / latest-alpine"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  RELEASE_REPO: madeye/meow-rs

jobs:
  docker:
    name: Build scratch and alpine images from upstream release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve variables
        id: vars
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ inputs.tag }}"
          PUSH_LATEST="${{ inputs.push_latest }}"

          IMAGE="${REGISTRY}/${GITHUB_REPOSITORY,,}"
          VERSION="${TAG#v}"

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "image=${IMAGE}"
            echo "push_latest=${PUSH_LATEST}"
          } >> "$GITHUB_OUTPUT"

          echo "TAG=${TAG}"
          echo "VERSION=${VERSION}"
          echo "IMAGE=${IMAGE}"
          echo "RELEASE_REPO=${RELEASE_REPO}"
          echo "PUSH_LATEST=${PUSH_LATEST}"

      - name: Resolve upstream release revision
        id: git
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          REVISION="$(gh release view "${TAG}" \
            --repo "${RELEASE_REPO}" \
            --json targetCommitish \
            --jq '.targetCommitish')"

          echo "revision=${REVISION}" >> "$GITHUB_OUTPUT"
          echo "REVISION=${REVISION}"

      - name: Prepare Docker context and download upstream binaries
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.vars.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          mkdir -p docker-context/binaries/amd64
          mkdir -p docker-context/binaries/arm64

          download_one() {
            local arch="$1"
            local target="$2"
            local asset="meow-${TAG}-${target}.tar.gz"
            local checksum="${asset}.sha256"
            local extract_dir="dist/extract-${arch}"

            echo "Downloading ${asset} from ${RELEASE_REPO}"

            gh release download "${TAG}" \
              --repo "${RELEASE_REPO}" \
              --pattern "${asset}" \
              --dir dist \
              --clobber

            if gh release download "${TAG}" \
              --repo "${RELEASE_REPO}" \
              --pattern "${checksum}" \
              --dir dist \
              --clobber; then
              (
                cd dist
                sha256sum -c "${checksum}"
              )
            else
              echo "Checksum file ${checksum} not found, skipping checksum verification."
            fi

            rm -rf "${extract_dir}"
            mkdir -p "${extract_dir}"

            tar -xzf "dist/${asset}" -C "${extract_dir}"

            bin_path="$(find "${extract_dir}" -type f -name meow | head -n 1)"

            if [[ -z "${bin_path}" ]]; then
              echo "Cannot find meow binary in ${asset}"
              find "${extract_dir}" -maxdepth 3 -type f -print
              exit 1
            fi

            cp "${bin_path}" "docker-context/binaries/${arch}/meow"
            chmod +x "docker-context/binaries/${arch}/meow"

            echo "Prepared ${arch} binary: docker-context/binaries/${arch}/meow"
          }

          download_one "amd64" "x86_64-unknown-linux-musl"
          download_one "arm64" "aarch64-unknown-linux-musl"

          cat > docker-context/config.yaml <<'EOF'
          # Mount your real meow config to /etc/meow/config.yaml
          # Example:
          # docker run -v ./config.yaml:/etc/meow/config.yaml:ro ...
          EOF

      - name: Generate Dockerfiles
        shell: bash
        run: |
          set -euo pipefail

          cat > docker-context/Dockerfile.scratch <<'EOF'
          FROM alpine:3.22 AS certs
          RUN apk add --no-cache ca-certificates

          FROM scratch

          ARG TARGETARCH
          ARG VERSION
          ARG REVISION
          ARG SOURCE

          LABEL org.opencontainers.image.title="meow-rs"
          LABEL org.opencontainers.image.description="Minimal scratch image for meow-rs"
          LABEL org.opencontainers.image.version="${VERSION}"
          LABEL org.opencontainers.image.revision="${REVISION}"
          LABEL org.opencontainers.image.source="${SOURCE}"
          LABEL org.opencontainers.image.variant="scratch"

          COPY --from=certs /etc/ssl/certs/ca-certificates.crt /etc/ssl/certs/ca-certificates.crt

          COPY --chmod=0755 binaries/${TARGETARCH}/meow /usr/local/bin/meow
          COPY config.yaml /etc/meow/config.yaml

          EXPOSE 7890/tcp
          EXPOSE 9090/tcp
          EXPOSE 1053/udp

          USER 65532:65532

          ENTRYPOINT ["/usr/local/bin/meow"]
          CMD ["-f", "/etc/meow/config.yaml"]
          EOF

          cat > docker-context/Dockerfile.alpine <<'EOF'
          FROM alpine:3.22

          ARG TARGETARCH
          ARG VERSION
          ARG REVISION
          ARG SOURCE

          LABEL org.opencontainers.image.title="meow-rs"
          LABEL org.opencontainers.image.description="Alpine debug image for meow-rs"
          LABEL org.opencontainers.image.version="${VERSION}"
          LABEL org.opencontainers.image.revision="${REVISION}"
          LABEL org.opencontainers.image.source="${SOURCE}"
          LABEL org.opencontainers.image.variant="alpine"

          RUN apk add --no-cache ca-certificates tzdata \
            && addgroup -S meow \
            && adduser -S -D -H -h /nonexistent -s /sbin/nologin -G meow meow

          COPY --chmod=0755 binaries/${TARGETARCH}/meow /usr/local/bin/meow
          COPY config.yaml /etc/meow/config.yaml

          EXPOSE 7890/tcp
          EXPOSE 9090/tcp
          EXPOSE 1053/udp

          USER meow:meow

          ENTRYPOINT ["/usr/local/bin/meow"]
          CMD ["-f", "/etc/meow/config.yaml"]
          EOF

      - name: Generate image tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ steps.vars.outputs.image }}"
          TAG="${{ steps.vars.outputs.tag }}"
          VERSION="${{ steps.vars.outputs.version }}"
          PUSH_LATEST="${{ steps.vars.outputs.push_latest }}"

          {
            echo "scratch<<EOF"
            echo "${IMAGE}:${TAG}-scratch"
            echo "${IMAGE}:${VERSION}-scratch"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE}:latest-scratch"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "alpine<<EOF"
            echo "${IMAGE}:${TAG}-alpine"
            echo "${IMAGE}:${VERSION}-alpine"
            if [[ "${PUSH_LATEST}" == "true" ]]; then
              echo "${IMAGE}:latest-alpine"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "Scratch tags:"
          echo "${IMAGE}:${TAG}-scratch"
          echo "${IMAGE}:${VERSION}-scratch"

          echo "Alpine tags:"
          echo "${IMAGE}:${TAG}-alpine"
          echo "${IMAGE}:${VERSION}-alpine"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push scratch image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile.scratch
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.scratch }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            REVISION=${{ steps.git.outputs.revision }}
            SOURCE=https://github.com/${{ env.RELEASE_REPO }}
          labels: |
            org.opencontainers.image.title=meow-rs
            org.opencontainers.image.description=Minimal scratch image for meow-rs
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ steps.git.outputs.revision }}
            org.opencontainers.image.source=https://github.com/${{ env.RELEASE_REPO }}
            org.opencontainers.image.variant=scratch
          provenance: true
          sbom: true

      - name: Build and push alpine image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile.alpine
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.alpine }}
          build-args: |
            VERSION=${{ steps.vars.outputs.version }}
            REVISION=${{ steps.git.outputs.revision }}
            SOURCE=https://github.com/${{ env.RELEASE_REPO }}
          labels: |
            org.opencontainers.image.title=meow-rs
            org.opencontainers.image.description=Alpine debug image for meow-rs
            org.opencontainers.image.version=${{ steps.vars.outputs.version }}
            org.opencontainers.image.revision=${{ steps.git.outputs.revision }}
            org.opencontainers.image.source=https://github.com/${{ env.RELEASE_REPO }}
            org.opencontainers.image.variant=alpine
          provenance: true
          sbom: true
